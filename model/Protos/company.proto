syntax = "proto3";

option csharp_namespace = "BizSrt.Model.Grpc";

package company;

service CompanyService {
  rpc IndexCompany (IndexCompanyRequest) returns (IndexCompanyResponse);
  rpc IndexProduct (IndexProductRequest) returns (IndexProductResponse);
  rpc IndexProductFacetSet (IndexProductFacetSetRequest) returns (IndexProductFacetSetResponse);
  rpc DeleteProductFacetSet (DeleteProductFacetSetRequest) returns (DeleteProductFacetSetResponse);
}

message IndexCompanyRequest {
  int32 company_id = 1;
}

message IndexCompanyResponse {
  bool success = 1;
}

message IndexProductRequest {
  int64 product_id = 1;
}

message IndexProductResponse {
  bool success = 1;
}

message IndexProductFacetSetRequest {
  int32 set_id = 1;
}

message IndexProductFacetSetResponse {
  bool success = 1;
}

message DeleteProductFacetSetRequest {
  int32 set_id = 1;
}

message DeleteProductFacetSetResponse {
  bool success = 1;
}
